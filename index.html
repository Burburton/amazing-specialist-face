<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>amazing-specialist-face</title>
    <script>
      // Theme initialization (runs before React to prevent flash)
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 'system';
          if (theme !== 'system') {
            document.documentElement.setAttribute('data-theme', theme);
          }
        } catch (e) {}
      })();
      
      // SPA routing for GitHub Pages
      // Handles redirects from 404.html
      (function() {
        var pathSegmentsToKeep = 1; // Keep '/amazing-specialist-face' in the path
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          l.replace(
            l.origin + 
            l.pathname + 
            decoded[0].slice(1) +
            (decoded[1] ? '?' + decoded.slice(1).join('&') : '') +
            l.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
