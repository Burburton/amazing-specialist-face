<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // SPA redirect script for GitHub Pages with HashRouter
    // Redirects all paths to index.html with the path as a hash route
    var l = window.location;
    var basePath = '/amazing-specialist-face';
    
    // Get the path after the base path
    var path = l.pathname;
    if (path.startsWith(basePath)) {
      path = path.slice(basePath.length);
    }
    
    // Redirect to base URL with hash route
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      basePath + '/#' + path +
      l.search + l.hash
    );
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
